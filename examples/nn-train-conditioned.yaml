mode: train

train:
  random_seed: 42
  mode: temporal_unrolling
  # Example of a NN Conditioned model class
  model_cls: FokkerPlanck2D_NNConditioned_AD
  model_cls_kwargs:
    ensure_non_negative_f: true
    guard_cells: true
    width_size: 64
    depth: 2
    activation: torch.nn.LeakyReLU
    use_bias: true
    use_final_bias: true
    # It is recommended to normalize conditioners to be between [-1,1]
    normalize_conditioners: true
  data:
    folders:
      - examples/dataset/normal_-2_0/f
      - examples/dataset/ring_normal_2_0.2/f
      - examples/dataset/normal_-2_0_sim2/f
    # For each folder, you must specify the conditioners to use
    conditioners:
      - ppc: 4
        v_th: 0.01
        shape: 1
        dx_lD: 1.0
      - ppc: 4
        v_th: 0.01
        shape: 1
        dx_lD: 1.0
      - ppc: 25
        v_th: 0.1
        shape: 4
        dx_lD: 2.0
    train_valid_ratio: 0.95
  # This is the dataset class for training with conditioners
  dataset_cls: TemporalUnrolledwConditionersDataset
  dataset_cls_kwargs:
    step_size: 1
    i_start: 5
  dataloader_cls: null
  temporal_unrolling_stages:
    stage-1-0:
      unrolling_steps: 1
      epochs: 500
      lr: 0.001
    stage-1:
      unrolling_steps: 1
      epochs: 500
      lr: 0.0001
    stage-2:
      unrolling_steps: 2
      epochs: 200
      lr: 0.0001
    stage-5:
      unrolling_steps: 5
      epochs: 200
      lr: 0.0001
    stage-10:
      unrolling_steps: 10
      epochs: 500
      lr: 0.0001
  callbacks:
    log_best_model:
      enabled: true
      frequency: stage_end
    log_best_stage_model:
      enabled: true
    # One plot is performed per unique set unique of conditioners.
    # Consider setting flags to False if using too many conditioners to avoid slowing
    # the training process unecessarily.
    plot_best_stage_model: 
      enabled: true
    plot_best_final_model: 
      enabled: true
    plot_model_start:
      enabled: true
  optimizer_cls: torch.optim.Adam
  loss:
    name: 'mae'
    mode: 'accumulated'