mode: test

test:
  mode: "rollout"
  # Similarly to train, you have to say which datasets you are using
  data:
    folders:
      - examples/dataset/normal_-2_0/f
      - examples/dataset/ring_normal_2_0.2/f
    step_size: 1
  # This section tells the code where to look for the trained model checkpoint
  model:
    # By default it was stored with mlflow so you should not have to change this
    type: mlflow
    # These should match the names given when launching the train script
    experiment_name: examples-train
    run_name: tensor-train
    # The "best" model is always saved in weigths-best.pth
    fname: weights-best.pth
    # You can change some of the model_cls_kwargs here
    change_params:
      guard_cells: true
      ensure_non_negative_D: true
  # If video=True, a video with comparison of prediction versus ground_truth is 
  # produced and stored in mlflow
  video: true
  video_fps: 10
