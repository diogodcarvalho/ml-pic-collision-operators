mode: test

test:
  mode: "rollout"
  data:
    folders:
      - examples/dataset/normal_-2_0_0_3D/f
      - examples/dataset/ring_normal_2_0.2_3D/f
    step_size: 2
  model:
    type: mlflow
    experiment_name: examples-train
    run_name: nn-train-3D
    fname: weights-best.pth
    change_params:
      guard_cells: true
      ensure_non_negative_D: true
  video: true
  video_fps: 10
  plot_slice:
    axis: 2
    index: 26
    