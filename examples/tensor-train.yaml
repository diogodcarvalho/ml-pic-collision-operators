mode: train

train:
  random_seed: 42
  # Use temporal unrolling during training.
  # More info in temporal_unrolling_stages
  mode: temporal_unrolling
  # Which model class to use.
  # See all classes implemented in models/fp2d
  # The one below is the simplest one, it does not enforce any symmetries.
  model_cls: FokkerPlanck2D_Tensor_AD
  model_cls_kwargs: # Corresponding class kwargs
    ensure_non_negative_f: true
  # Which data to use for training
  data:
    folders:
      - examples/dataset/normal_-2_0/f
      - examples/dataset/ring_normal_2_0.2/f
    train_valid_ratio: 0.95 # can use part for validation
  # Which dataset class to use.
  # See classes implemented in datasets/
  # For mode=temporal_unrolling this is the one to use.
  dataset_cls: TemporalUnrolledDataset
  dataset_cls_kwargs:
    step_size: 1
    i_start: 5
  dataloader_cls: null  # null = all data loaded to memory
  # dataloader_cls_kwargs: # if a cls is provided, args are passed as folows 
  #   param_1: value_1
  #   param_2: value_2
  # You can define multiple training stages.
  # Each stage should have the values below defined:
  #   unrolling_steps - number of steps the FP solver does before backpropagation
  #   epochs - how many epochs the stage lasts
  #   lr (optional) - learning rate for that particular stage
  temporal_unrolling_stages:
    stage-1:
      unrolling_steps: 1
      epochs: 1000
    stage-2:
      unrolling_steps: 2
      epochs: 200
    stage-5:
      unrolling_steps: 5
      epochs: 200
    stage-10:
      unrolling_steps: 10
      epochs: 500
  # You shouldn´t have to touch these.
  # They are callbacks triggered during the training.
  callbacks:
    log_best_model: # logs current best model to a checkpoint file
      enabled: true
      frequency: stage_end # only at the end of each stage
    log_best_stage_model:  # logs best model of the corresponding stage
      enabled: true
    plot_best_stage_model: # plots the best model of the corresponding stage
      enabled: true
    plot_best_final_model: # plots best model over the full training
      enabled: true
    plot_model_start: # plots the model at the beggining of training
      enabled: true
    # logging metrics very frequently can slow down training. 
    log_metrics_step: # log metrics every n steps. this one is disabled by default.
      enabled: false
    log_metrics_epoch: # log metrics every n epochs
      enabled: True
      frequency: 100 # default is 1, but setting higher value can speed up training.
    log_metrics_stage: # log (best) metrics at the end of each stage
      enabled: True
  # Optimizer to use (should not have to change)
  optimizer_cls: torch.optim.Adam
  optimizer_cls_kwargs:
    lr: 0.001
  # Loss to use (should not have to change)
  # mae (mean absolute error) or mse (mean squared error)
  loss:
    name: 'mae'
    mode: 'accumulated'
